<header class="header">
  <h1 class="logo">Notes</h1>

  <div class="search-container">
    <svg
      class="search-icon"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input
      type="search"
      placeholder="Search notes..."
      class="search-input"
      aria-label="Search notes"
      (input)="onSearch($event)"
    />
  </div>
</header>
