<div
  class="card"

  (click)="onOpenNote()"
>
  <button
    class="icon-btn pin-btn"
    [class.is-pinned]="note.isPinned"
    (click)="onTogglePin($event)"
    title="Pin note"
  >
    <svg
      viewBox="0 0 24 24"
      [attr.fill]="note.isPinned ? 'currentColor' : 'none'"
      stroke="currentColor"
      stroke-width="2"
    >
      <path
        d="M21 10V8l-2.25-1.5L13 2H11L5.25 6.5 3 8v2l2 2v5l-2 3v2h18v-2l-2-3v-5l2-2z"
      ></path>
    </svg>
  </button>

  <div class="content">
    <h3>{{ note.title }}</h3>
    <p>{{ note.content }}</p>
  </div>

  <button
    class="icon-btn delete-btn"
    (click)="delete($event)"
    title="Delete note"
  >
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="3 6 5 6 21 6"></polyline>
      <path
        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
      ></path>
    </svg>
  </button>
</div>

@if (showDeletePopup) {
  <app-confirm-dialog (cancel)="cancelDelete()" (confirm)="confirmDelete()" />
}
